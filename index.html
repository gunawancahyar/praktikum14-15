<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Management System</title>
  
  <!-- Font Pendukung Kemewahan Akademis -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- PANGGIL FILE CSS KAMU DI SINI -->
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
  <h1>🎓 Student Management System</h1>
  <p class="subtitle">Kelola data mahasiswa dengan mudah (CRUD)</p>

  <div id="message"></div>

  <div class="card">
    <h2 id="formTitle">Tambah Mahasiswa</h2>
    <form id="studentForm">
      <input type="hidden" id="studentId">
      <div>
        <label>NIM</label>
        <input type="text" id="nim" required>
      </div>
      <div>
        <label>Nama Lengkap</label>
        <input type="text" id="name" required>
      </div>
      <div>
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      <div>
        <label>Jurusan</label>
        <input type="text" id="major">
      </div>
      <div>
        <label>Semester</label>
        <input type="number" id="semester" min="1" max="14" value="1">
      </div>
      <div class="full">
        <button type="submit" class="btn-primary" id="submitBtn">Simpan</button>
        <button type="button" class="btn-secondary" id="cancelBtn" style="display:none;">Batal</button>
      </div>
    </form>
  </div>

  <div class="card">
    <h2>Daftar Mahasiswa</h2>
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>NIM</th>
            <th>Nama</th>
            <th>Email</th>
            <th>Jurusan</th>
            <th>Semester</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="studentTableBody">
          <tr><td colspan="6">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API_URL = '/api/students';

const form = document.getElementById('studentForm');
const tableBody = document.getElementById('studentTableBody');
const formTitle = document.getElementById('formTitle');
const submitBtn = document.getElementById('submitBtn');
const cancelBtn = document.getElementById('cancelBtn');
const messageBox = document.getElementById('message');

function showMessage(text, type = 'success') {
  messageBox.textContent = text;
  messageBox.className = type === 'success' ? 'msg-success' : 'msg-error';
  messageBox.style.display = 'block';
  setTimeout(() => { messageBox.style.display = 'none'; }, 3000);
}

async function loadStudents() {
  try {
    const res = await fetch(API_URL);
    const result = await res.json();

    if (!result.success || result.data.length === 0) {
      tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-muted);">Belum ada data mahasiswa</td></tr>';
      return;
    }

    tableBody.innerHTML = result.data.map(s => `
      <tr>
        <td style="font-weight: 600;">${s.nim}</td>
        <td>${s.name}</td>
        <td>${s.email}</td>
        <td>${s.major || '-'}</td>
        <td><span style="background: var(--secondary); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;">Smstr ${s.semester}</span></td>
        <td>
          <button class="btn-edit" onclick='editStudent(${JSON.stringify(s)})'>Edit</button>
          <button class="btn-delete" onclick="deleteStudent(${s.id})">Hapus</button>
        </td>
      </tr>
    `).join('');
  } catch (err) {
    tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--danger);">Gagal memuat data</td></tr>';
  }
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const id = document.getElementById('studentId').value;
  const payload = {
    nim: document.getElementById('nim').value,
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    major: document.getElementById('major').value,
    semester: document.getElementById('semester').value
  };

  try {
    const res = await fetch(id ? `${API_URL}/${id}` : API_URL, {
      method: id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const result = await res.json();

    if (result.success) {
      showMessage(result.message, 'success');
      resetForm();
      loadStudents();
    } else {
      showMessage(result.message, 'error');
    }
  } catch (err) {
    showMessage('Terjadi kesalahan koneksi ke server', 'error');
  }
});

function editStudent(student) {
  document.getElementById('studentId').value = student.id;
  document.getElementById('nim').value = student.nim;
  document.getElementById('name').value = student.name;
  document.getElementById('email').value = student.email;
  document.getElementById('major').value = student.major || '';
  document.getElementById('semester').value = student.semester;

  formTitle.textContent = 'Edit Mahasiswa';
  submitBtn.textContent = 'Update';
  cancelBtn.style.display = 'inline-block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deleteStudent(id) {
  if (!confirm('Yakin ingin menghapus data ini?')) return;

  try {
    const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
    const result = await res.json();
    showMessage(result.message, result.success ? 'success' : 'error');
    loadStudents();
  } catch (err) {
    showMessage('Terjadi kesalahan koneksi ke server', 'error');
  }
}

function resetForm() {
  form.reset();
  document.getElementById('studentId').value = '';
  document.getElementById('semester').value = 1;
  formTitle.textContent = 'Tambah Mahasiswa';
  submitBtn.textContent = 'Simpan';
  cancelBtn.style.display = 'none';
}

cancelBtn.addEventListener('click', resetForm);

loadStudents();
</script>
</body>
</html>
